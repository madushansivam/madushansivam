<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 110" width="100%">
  <defs>
    <filter id="pglow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="psoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Packet motion path through all stages -->
    <path id="flowPath" d="M 20,55 L 180,55 L 330,55 L 480,55 L 620,55 L 790,55" fill="none"/>
  </defs>

  <!-- Background -->
  <rect width="820" height="110" rx="10" fill="#0d1117"/>
  <!-- Subtle grid -->
  <line x1="0" y1="55" x2="820" y2="55" stroke="#1a1f2e" stroke-width="1"/>

  <!-- ═══ STAGE 1: SOURCE ═══ -->
  <rect x="20" y="18" width="130" height="62" rx="7"
    fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <!-- Pulsing border -->
  <rect x="20" y="18" width="130" height="62" rx="7"
    fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1.5;3;1.5" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="85" y="42" text-anchor="middle" font-family="'Courier New',monospace"
    font-size="11" font-weight="bold" fill="#58a6ff">⌨ SOURCE</text>
  <text x="85" y="58" text-anchor="middle" font-family="'Courier New',monospace"
    font-size="9" fill="#6e7681">git push origin</text>
  <text x="85" y="72" text-anchor="middle" font-family="'Courier New',monospace"
    font-size="8" fill="#3d444d">madushansivam</text>

  <!-- Connector 1 -->
  <line x1="150" y1="55" x2="190" y2="55" stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="190,50 200,55 190,60" fill="#58a6ff" filter="url(#psoft)"/>

  <!-- ═══ STAGE 2: BUILD ═══ -->
  <rect x="200" y="18" width="130" height="62" rx="7"
    fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="265" y="42" text-anchor="middle" font-family="'Courier New',monospace"
    font-size="11" font-weight="bold" fill="#f0883e">🔨 BUILD</text>
  <text x="265" y="58" text-anchor="middle" font-family="'Courier New',monospace"
    font-size="9" fill="#6e7681">docker build .</text>
  <!-- Build progress bar -->
  <rect x="215" y="67" width="100" height="5" rx="2" fill="#1a1f2e"/>
  <rect x="215" y="67" width="0" height="5" rx="2" fill="#f0883e">
    <animate attributeName="width" values="0;100;0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Connector 2 -->
  <line x1="330" y1="55" x2="370" y2="55" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="370,50 380,55 370,60" fill="#f0883e" filter="url(#psoft)"/>

  <!-- ═══ STAGE 3: TEST ═══ -->
  <rect x="380" y="18" width="130" height="62" rx="7"
    fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="445" y="42" text-anchor="middle" font-family="'Courier New',monospace"
    font-size="11" font-weight="bold" fill="#3fb950">✔ TEST</text>
  <text x="445" y="58" text-anchor="middle" font-family="'Courier New',monospace"
    font-size="9" fill="#6e7681">all tests passing</text>
  <!-- Test dots -->
  <circle cx="420" cy="73" r="4" fill="#3fb950" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="435" cy="73" r="4" fill="#3fb950" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="73" r="4" fill="#3fb950" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="465" cy="73" r="4" fill="#3fb950" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" begin="0.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Connector 3 -->
  <line x1="510" y1="55" x2="550" y2="55" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="550,50 560,55 550,60" fill="#3fb950" filter="url(#psoft)"/>

  <!-- ═══ STAGE 4: DEPLOY ═══ -->
  <rect x="560" y="18" width="130" height="62" rx="7"
    fill="#0d1117" stroke="#a371f7" stroke-width="1.5"/>
  <!-- Deploy glow pulse -->
  <rect x="560" y="18" width="130" height="62" rx="7"
    fill="none" stroke="#a371f7" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="2;5;2" dur="3s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <text x="625" y="42" text-anchor="middle" font-family="'Courier New',monospace"
    font-size="11" font-weight="bold" fill="#a371f7">🚀 DEPLOY</text>
  <text x="625" y="58" text-anchor="middle" font-family="'Courier New',monospace"
    font-size="9" fill="#6e7681">k8s / AWS</text>
  <text x="625" y="73" text-anchor="middle" font-family="'Courier New',monospace"
    font-size="8" fill="#3d444d">✓ LIVE</text>

  <!-- ═══ ANIMATED PACKETS flowing through pipeline ═══ -->
  <!-- Packet 1 — blue -->
  <circle r="5.5" fill="#58a6ff" filter="url(#pglow)">
    <animateMotion dur="3s" repeatCount="indefinite"
      path="M20,55 L790,55"/>
    <animate attributeName="opacity" values="0;1;1;1;0" dur="3s" keyTimes="0;0.05;0.5;0.95;1" repeatCount="indefinite"/>
    <animate attributeName="r" values="5.5;6.5;5.5" dur="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Packet 2 — orange -->
  <circle r="4.5" fill="#f0883e" filter="url(#pglow)">
    <animateMotion dur="3s" begin="1s" repeatCount="indefinite"
      path="M20,55 L790,55"/>
    <animate attributeName="opacity" values="0;1;1;1;0" dur="3s" begin="1s" keyTimes="0;0.05;0.5;0.95;1" repeatCount="indefinite"/>
  </circle>

  <!-- Packet 3 — green -->
  <circle r="4" fill="#3fb950" filter="url(#pglow)">
    <animateMotion dur="3s" begin="2s" repeatCount="indefinite"
      path="M20,55 L790,55"/>
    <animate attributeName="opacity" values="0;1;1;1;0" dur="3s" begin="2s" keyTimes="0;0.05;0.5;0.95;1" repeatCount="indefinite"/>
  </circle>

  <!-- Packet 4 — purple (smaller, faster stagger) -->
  <circle r="3.5" fill="#a371f7" filter="url(#pglow)">
    <animateMotion dur="3s" begin="1.5s" repeatCount="indefinite"
      path="M20,55 L790,55"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0.8;0" dur="3s" begin="1.5s" keyTimes="0;0.05;0.5;0.95;1" repeatCount="indefinite"/>
  </circle>

  <!-- Status tag -->
  <rect x="710" y="26" width="90" height="20" rx="4" fill="#1a1f2e"/>
  <circle cx="722" cy="36" r="4" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="730" y="40" font-family="'Courier New',monospace" font-size="9" fill="#3fb950">PIPELINE OK</text>
</svg>
