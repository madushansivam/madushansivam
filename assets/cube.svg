<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="220" height="220">
  <defs>
    <!-- Outer glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle glow for edges -->
    <filter id="edge-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Top face gradient -->
    <linearGradient id="topG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
    <!-- Front face gradient -->
    <linearGradient id="frontG" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#0a3069"/>
    </linearGradient>
    <!-- Right face gradient -->
    <linearGradient id="rightG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d419d"/>
      <stop offset="100%" stop-color="#051e5a"/>
    </linearGradient>
    <!-- Shadow ellipse gradient -->
    <radialGradient id="shadowG">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="120" cy="236" rx="58" ry="7" fill="url(#shadowG)">
    <animate attributeName="rx" values="58;48;58" dur="3s" keyTimes="0;0.5;1"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" keyTimes="0;0.5;1"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
  </ellipse>

  <!-- FLOAT + SPIN composition -->
  <!-- Outer group: float up/down -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-10; 0,0" dur="3s" keyTimes="0;0.5;1"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      repeatCount="indefinite"/>

    <!-- Inner group: Y-axis spin -->
    <g filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate"
        from="0 120 125" to="360 120 125"
        dur="10s" repeatCount="indefinite"/>

      <!-- === CUBE FACES === -->
      <!-- Vertices at θ=0 isometric projection (scale=40):
           Top:   FTL(51,85) FTR(120,125) BTR(189,85) BTL(120,45)
           Front: FTL(51,85) FTR(120,125) FBR(120,205) FBL(51,165)
           Right: FTR(120,125) BTR(189,85) BBR(189,165) FBR(120,205) -->

      <!-- Top face -->
      <polygon points="51,85 120,125 189,85 120,45"
        fill="url(#topG)" stroke="#79c0ff" stroke-width="0.8" stroke-opacity="0.8"/>

      <!-- Front (left) face -->
      <polygon points="51,85 120,125 120,205 51,165"
        fill="url(#frontG)" stroke="#58a6ff" stroke-width="0.8" stroke-opacity="0.6"/>

      <!-- Right face -->
      <polygon points="120,125 189,85 189,165 120,205"
        fill="url(#rightG)" stroke="#388bfd" stroke-width="0.8" stroke-opacity="0.6"/>

      <!-- === CONTAINER GRID ON FRONT FACE === -->
      <!-- Small Docker-container-style boxes -->
      <rect x="62" y="108" width="20" height="15" rx="2"
        fill="#1f6feb" fill-opacity="0.4" stroke="#79c0ff" stroke-width="0.6" stroke-opacity="0.6"/>
      <rect x="62" y="128" width="20" height="15" rx="2"
        fill="#1f6feb" fill-opacity="0.3" stroke="#79c0ff" stroke-width="0.6" stroke-opacity="0.5"/>
      <rect x="62" y="148" width="20" height="15" rx="2"
        fill="#1f6feb" fill-opacity="0.2" stroke="#79c0ff" stroke-width="0.6" stroke-opacity="0.4"/>
      <rect x="85" y="120" width="20" height="15" rx="2"
        fill="#0d419d" fill-opacity="0.5" stroke="#79c0ff" stroke-width="0.6" stroke-opacity="0.5"/>
      <rect x="85" y="140" width="20" height="15" rx="2"
        fill="#0d419d" fill-opacity="0.3" stroke="#79c0ff" stroke-width="0.6" stroke-opacity="0.4"/>

      <!-- === CONTAINER GRID ON RIGHT FACE === -->
      <rect x="130" y="108" width="20" height="15" rx="2"
        fill="#0a3069" fill-opacity="0.5" stroke="#388bfd" stroke-width="0.6" stroke-opacity="0.5"/>
      <rect x="153" y="96" width="20" height="15" rx="2"
        fill="#0a3069" fill-opacity="0.4" stroke="#388bfd" stroke-width="0.6" stroke-opacity="0.4"/>
      <rect x="130" y="128" width="20" height="15" rx="2"
        fill="#0a3069" fill-opacity="0.3" stroke="#388bfd" stroke-width="0.6" stroke-opacity="0.3"/>

      <!-- === GLOWING VERTICES === -->
      <!-- Center (FTR) -->
      <circle cx="120" cy="125" r="4" fill="#79c0ff" opacity="0.95" filter="url(#edge-glow)">
        <animate attributeName="r" values="4;2.5;4" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.95;0.4;0.95" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- Top apex (BTL) -->
      <circle cx="120" cy="45" r="2.5" fill="#79c0ff" opacity="0.8" filter="url(#edge-glow)">
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <!-- Left apex (FTL) -->
      <circle cx="51" cy="85" r="2" fill="#58a6ff" opacity="0.7" filter="url(#edge-glow)">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" begin="0.7s" repeatCount="indefinite"/>
      </circle>
      <!-- Right apex (BTR) -->
      <circle cx="189" cy="85" r="2" fill="#388bfd" opacity="0.7" filter="url(#edge-glow)">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
      </circle>
      <!-- Bottom apex (FBR) -->
      <circle cx="120" cy="205" r="2" fill="#1f6feb" opacity="0.6" filter="url(#edge-glow)">
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
      </circle>

      <!-- === PULSE RING around cube center === -->
      <circle cx="120" cy="125" r="18" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0">
        <animate attributeName="r" values="18;50;18" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
